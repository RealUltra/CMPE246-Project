<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="p5.min.js" defer></script>
    <link rel="stylesheet" type="text/css" href="style.css?v=6" />
    <meta charset="utf-8" />
  </head>
  <body>
    <main></main>
    <button class="pauseButton" id="pauseButton">Pause</button>
    <button class="unmutedButton" id="muteButton">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="size-6 hidden"
        id="muted-svg"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M9.143 17.082a24.248 24.248 0 0 0 3.844.148m-3.844-.148a23.856 23.856 0 0 1-5.455-1.31 8.964 8.964 0 0 0 2.3-5.542m3.155 6.852a3 3 0 0 0 5.667 1.97m1.965-2.277L21 21m-4.225-4.225a23.81 23.81 0 0 0 3.536-1.003A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6.53 6.53m10.245 10.245L6.53 6.53M3 3l3.53 3.53"
        />
      </svg>
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        strokeWidth="1.5"
        stroke="currentColor"
        class="size-6"
        id="unmuted-svg"
      >
        <path
          strokeLinecap="round"
          strokeLinejoin="round"
          d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0"
        />
      </svg>
    </button>

    <div class="danger-zone-container">
      <label for="dangerZoneSlider">Danger Zone (cm)</label>
      <input
        type="range"
        id="dangerZoneSlider"
        name="dangerZoneSlider"
        min="5"
        step="1"
        value="20"
        class="danger-zone-slider"
      />

      <div class="danger-zone-input-wrapper">
        <button
          id="cancelDangerZoneButton"
          class="cancelButton"
          aria-label="Cancel Danger Zone"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-6"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M6 18 18 6M6 6l12 12"
            />
          </svg>
        </button>

        <input
          type="number"
          id="dangerZoneInput"
          name="dangerZone"
          min="5"
          step="1"
          value="20"
          class="danger-zone-number-input"
          aria-label="Danger Zone Value"
        />
        <button
          id="updateDangerZoneButton"
          class="updateButton"
          aria-label="Update Danger Zone"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-6"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="m4.5 12.75 6 6 9-13.5"
            />
          </svg>
        </button>
      </div>
    </div>

    <script src="socket-handler.js?v=7"></script>
    <script src="sketch.js?v=13" defer></script>
  </body>
</html>
